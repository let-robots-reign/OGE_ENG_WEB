# hide Nginx version for security
server_tokens off;

# gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/xml text/javascript application/javascript image/svg+xml;
gzip_min_length 1000;
gzip_disable "msie6";

server {
  listen 80;
  # Replace with your actual domain name
  server_name oge-eng.ru www.oge-eng.ru;

  # allow Let's Encrypt to verify domain ownership
  location /.well-known/acme-challenge/ {
      root /var/www/certbot;
  }

  location / {
      return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;

  server_name oge-eng.ru www.oge-eng.ru;

  ssl_certificate /etc/letsencrypt/live/oge-eng.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/oge-eng.ru/privkey.pem;

  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  # security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;

  location / {
    proxy_pass http://web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
